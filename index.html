<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan CAC 2026 · Gerardo Benítez · ILCA 7</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222537;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--text2:#9ca3af;--text3:#6b7280;--accent:#4f8ef7;--orange:#f97316;--green:#22c55e;--yellow:#eab308;--red:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* ── Header ── */
.header{background:linear-gradient(135deg,rgba(79,142,247,.12),rgba(124,110,245,.08));border-bottom:1px solid var(--border);padding:28px 20px 22px;text-align:center}
.header-logo{font-size:10px;font-weight:800;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.header-logo::before,.header-logo::after{content:'';flex:1;max-width:40px;height:1px;background:rgba(79,142,247,.3)}
.header-name{font-size:26px;font-weight:800;margin-bottom:5px;letter-spacing:-.3px}
.header-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.countdown{display:inline-flex;align-items:center;gap:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:20px;padding:7px 18px;font-size:13px;font-weight:800;color:#ef4444;letter-spacing:.3px}

/* ── Phase strip ── */
.phase-strip{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px}
.strip-label{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.phases-row{display:flex;gap:4px}
.p-pill{flex:1;text-align:center;padding:9px 4px;border-radius:10px;border:1px solid transparent;opacity:.45;cursor:default}
.p-pill.active{opacity:1}
.p-pill-key{font-size:12px;font-weight:800}
.p-pill-tag{font-size:8px;margin-top:2px;font-weight:600;opacity:.8}
.phase-progress-bar{margin-top:10px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.phase-progress-fill{height:100%;border-radius:2px;transition:width .6s}

/* ── Today card ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.card-header{padding:11px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-label{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.card-sub{font-size:11px;color:var(--text2)}

.today-body{padding:18px 16px}
.today-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.today-icon{font-size:32px;line-height:1}
.today-name{font-size:19px;font-weight:800;line-height:1.2;margin-bottom:4px}
.today-type{font-size:11px;color:var(--text2)}
.today-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chip{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);background:var(--surface2);padding:4px 10px;border-radius:7px;border:1px solid var(--border)}
.tss-chip{background:rgba(79,142,247,.1);color:var(--accent);border-color:rgba(79,142,247,.2);font-weight:700}
.done-chip{background:rgba(34,197,94,.1);color:var(--green);border-color:rgba(34,197,94,.25);font-weight:700}
.coach-note{font-size:12px;color:var(--text2);line-height:1.55;padding:10px 13px;background:rgba(255,255,255,.025);border-radius:9px;border-left:3px solid var(--accent)}
.coach-note::before{content:'💬 ';font-size:11px}
.rest-msg{padding:24px;text-align:center;color:var(--text3);font-size:14px}

/* ── Week grid ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wday{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;min-height:72px;display:flex;flex-direction:column;align-items:center;gap:3px}
.wday.is-today{background:rgba(79,142,247,.07)}
.wday.is-rest{opacity:.35}
.wday-dn{font-size:8px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--text3)}
.wday-num{font-size:15px;font-weight:800}
.wday-icon{font-size:14px}
.wday-tss{font-size:8px;color:var(--text3)}

/* ── Plan sections ── */
.phase-block{margin-bottom:20px}
.phase-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:11px;margin-bottom:6px}
.phase-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.phase-hd-name{font-size:13px;font-weight:800}
.phase-hd-dates{font-size:10px;opacity:.7;margin-top:1px}
.phase-stats{margin-left:auto;text-align:right}
.phase-count{font-size:11px;font-weight:700}
.phase-tss-total{font-size:10px;color:var(--text3)}
.now-badge{font-size:8px;font-weight:800;padding:3px 8px;border-radius:10px;color:#000;margin-left:6px}

.wo-row{display:flex;align-items:flex-start;gap:11px;padding:10px 13px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:3px}
.wo-row.is-today{background:rgba(79,142,247,.04)}
.wo-date{min-width:36px;text-align:center;flex-shrink:0}
.wo-date-dn{font-size:8px;color:var(--text3);text-transform:uppercase;font-weight:700}
.wo-date-d{font-size:16px;font-weight:800;line-height:1}
.wo-date-m{font-size:8px;color:var(--text3)}
.wo-ico{font-size:18px;padding-top:2px;flex-shrink:0}
.wo-info{flex:1;min-width:0}
.wo-name{font-size:13px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wo-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px}
.wo-time{font-size:11px;color:var(--text2)}
.wo-note{font-size:11px;color:var(--text3);line-height:1.4}

/* ── Stats bar ── */
.stats-row{display:flex;gap:4px;margin-bottom:16px}
.stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px 8px;text-align:center}
.stat-val{font-size:20px;font-weight:800;margin-bottom:2px}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)}

/* ── Layout ── */
.wrap{max-width:700px;margin:0 auto;padding:14px 14px 30px}
.section-title{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;padding:0 2px}
.gap{margin-bottom:14px}

/* ── Footer ── */
.footer{text-align:center;padding:20px;color:var(--text3);font-size:11px;border-top:1px solid var(--border);margin-top:8px}

/* ── Loading ── */
.loading{text-align:center;padding:60px 20px;color:var(--text2);font-size:14px}
.loading::after{content:'';display:block;width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin:14px auto 0;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:400px){
  .wday-num{font-size:13px}.wday-icon{font-size:13px}.header-name{font-size:22px}
  .stats-row{gap:3px}.stat-val{font-size:17px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Tu Coach · ILCA 7</div>
  <div class="header-name">Gerardo Benítez</div>
  <div class="header-sub">CAC Games 2026 · Barranquilla · ILCA 7 (Laser)</div>
  <div class="countdown" id="countdown">— días para CAC Games</div>
</div>

<div class="phase-strip">
  <div class="strip-label">Plan de Periodización</div>
  <div class="phases-row" id="phase-pills"></div>
  <div class="phase-progress-bar"><div class="phase-progress-fill" id="phase-progress" style="width:0%"></div></div>
</div>

<div class="wrap">

  <!-- Today -->
  <div class="gap" id="today-wrap">
    <div class="loading">Cargando plan...</div>
  </div>

  <!-- Stats -->
  <div class="stats-row gap" id="stats-row" style="display:none"></div>

  <!-- Week -->
  <div class="gap" id="week-wrap" style="display:none">
    <div class="section-title">Esta semana</div>
    <div class="week-grid" id="week-grid"></div>
  </div>

  <!-- Full plan -->
  <div id="full-plan">
    <div class="section-title" style="margin-top:4px">Plan completo · 63 sesiones</div>
    <div id="plan-body"><div class="loading"></div></div>
  </div>

</div>

<div class="footer">
  Vista Coach · Plan CAC Games 2026 · actualizado desde
  <a href="https://github.com/gerardobeparis2020-art/tu-coach" target="_blank">GitHub</a>
  · última actualización: <span id="last-update">—</span>
</div>

<script>
const PHASES=[
  {key:'F1',name:'F1 Base Técnica',short:'F1',start:'2026-06-07',end:'2026-06-21',color:'#4f8ef7',bg:'rgba(79,142,247,.12)',tssWeek:360},
  {key:'F2',name:'F2 Carga',short:'F2',start:'2026-06-22',end:'2026-07-12',color:'#f97316',bg:'rgba(249,115,22,.12)',tssWeek:490},
  {key:'F3',name:'F3 Especificidad',short:'F3',start:'2026-07-13',end:'2026-07-26',color:'#22c55e',bg:'rgba(34,197,94,.12)',tssWeek:430},
  {key:'F4',name:'F4 Taper',short:'F4',start:'2026-07-27',end:'2026-08-01',color:'#eab308',bg:'rgba(234,179,8,.12)',tssWeek:160},
  {key:'COMP',name:'CAC Games',short:'CAC',start:'2026-08-01',end:'2026-08-08',color:'#ef4444',bg:'rgba(239,68,68,.12)',tssWeek:220},
]
const ICONS={'Fuerza / Gym':'🏋️','Ciclismo':'🚴','Carrera / Movilidad':'🏃','Carrera':'🏃','Vela':'⛵','Técnica Vela':'⛵','Técnica':'⛵','Core / Movilidad':'🧘','Core':'🧘','Movilidad':'🧘','Regata':'🏆','Descanso':'😴'}
const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb']
const DAYS_SHORT=['D','L','M','X','J','V','S']
const MONTHS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']

function todayStr(){return new Date().toISOString().slice(0,10)}
function getPhase(d){return PHASES.find(p=>d>=p.start&&d<=p.end)}
function icon(type){if(!type)return'📋';for(const[k,v]of Object.entries(ICONS))if(type.includes(k)||k.includes(type))return v;return'📋'}
function fmt(ds){const d=new Date(ds+'T12:00:00');return`${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`}
function tssChip(tss){return`<span class="chip tss-chip">TSS ${tss}</span>`}
function doneChip(){return`<span class="chip done-chip">✓ Completado</span>`}

function renderCountdown(){
  const diff=Math.ceil((new Date('2026-08-01T12:00:00')-new Date())/(864e5))
  const el=document.getElementById('countdown')
  el.textContent=diff>0?`🏆 ${diff} días para CAC Games`:diff===0?'🏆 ¡Hoy son los CAC Games!':'🏆 CAC Games 2026 completados'
}

function renderPhases(){
  const t=todayStr()
  const pills=document.getElementById('phase-pills')
  pills.innerHTML=PHASES.map(p=>{
    const active=t>=p.start&&t<=p.end
    const past=t>p.end
    return`<div class="p-pill${active?' active':''}" style="background:${active?p.bg:past?'rgba(255,255,255,.03)':'transparent'};border-color:${active?p.color+'44':'transparent'};color:${active?p.color:past?'#4b5563':'#374151'}">
      <div class="p-pill-key">${p.short}</div>
      <div class="p-pill-tag">${active?'▶ Ahora':past?'✓':''}</div>
    </div>`
  }).join('')

  const active=getPhase(t)
  if(active){
    const s=new Date(active.start+'T12:00:00'),e=new Date(active.end+'T12:00:00'),now=new Date()
    const pct=Math.min(100,Math.round((now-s)/(e-s)*100))
    const fill=document.getElementById('phase-progress')
    fill.style.width=pct+'%'
    fill.style.background=active.color
  }
}

function renderStats(workouts,t){
  const el=document.getElementById('stats-row')
  const total=workouts.length
  const done=workouts.filter(w=>w.status==='COMPLETED').length
  const tssTotal=workouts.reduce((s,w)=>s+(w.tss_planned||0),0)
  const raceDate=new Date('2026-08-01T12:00:00')
  const daysLeft=Math.max(0,Math.ceil((raceDate-new Date())/864e5))
  el.innerHTML=[
    {val:done,lbl:'Sesiones hechas',color:'var(--green)'},
    {val:`${total-done}`,lbl:'Pendientes',color:'var(--accent)'},
    {val:tssTotal,lbl:'TSS planeado',color:'var(--orange)'},
    {val:daysLeft,lbl:'Días p/ CAC',color:'var(--red)'},
  ].map(s=>`<div class="stat-box">
    <div class="stat-val" style="color:${s.color}">${s.val}</div>
    <div class="stat-lbl">${s.lbl}</div>
  </div>`).join('')
  el.style.display='flex'
}

function renderToday(workouts){
  const t=todayStr()
  const w=workouts.find(w=>w.date===t)
  const phase=getPhase(t)
  const wrap=document.getElementById('today-wrap')

  if(w){
    wrap.innerHTML=`<div class="section-title">Hoy · ${fmt(t)}</div>
    <div class="card" ${phase?`style="border-color:${phase.color}33"`:''}>
      <div class="card-header">
        <div class="card-label">Sesión de hoy</div>
        ${phase?`<div style="font-size:10px;font-weight:800;color:${phase.color}">${phase.name}</div>`:''}
      </div>
      <div class="today-body">
        <div class="today-top">
          <div class="today-icon">${icon(w.type)}</div>
          <div>
            <div class="today-name">${w.name}</div>
            <div class="today-type">${w.type}</div>
          </div>
        </div>
        <div class="today-chips">
          <div class="chip">⏱ ${w.duration_min} min</div>
          ${tssChip(w.tss_planned)}
          ${w.rpe?`<div class="chip">RPE ${w.rpe}/10</div>`:''}
          ${w.status==='COMPLETED'?doneChip():''}
        </div>
        ${w.coach_note?`<div class="coach-note">${w.coach_note}</div>`:''}
      </div>
    </div>`
  } else {
    wrap.innerHTML=`<div class="section-title">Hoy · ${fmt(t)}</div>
    <div class="card"><div class="rest-msg">😴 Día de descanso · ${fmt(t)}</div></div>`
  }
}

function renderWeek(workouts){
  const t=todayStr()
  const td=new Date(t+'T12:00:00')
  const dow=td.getDay()
  const mon=new Date(td)
  mon.setDate(td.getDate()-(dow===0?6:dow-1))

  document.getElementById('week-wrap').style.display='block'
  const grid=document.getElementById('week-grid')
  const phase=getPhase(t)

  let html=''
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i)
    const ds=d.toISOString().slice(0,10)
    const w=workouts.find(w=>w.date===ds)
    const isT=ds===t
    const ph=getPhase(ds)
    html+=`<div class="wday${isT?' is-today':''}${!w?' is-rest':''}" ${isT&&ph?`style="border-color:${ph.color}55;background:${ph.bg.replace('.12','.06')}"`:''}>
      <div class="wday-dn">${['D','L','M','X','J','V','S'][d.getDay()]}</div>
      <div class="wday-num" ${isT&&ph?`style="color:${ph.color}"`:''}>${d.getDate()}</div>
      ${w?`<div class="wday-icon">${icon(w.type)}</div><div class="wday-tss">TSS ${w.tss_planned}</div>`:'<div style="font-size:11px;color:var(--border)">·</div>'}
      ${w?.status==='COMPLETED'?`<div style="font-size:8px;color:var(--green);font-weight:800">✓</div>`:''}
    </div>`
  }
  grid.innerHTML=html
}

function renderPlan(workouts){
  const t=todayStr()
  let html=''

  for(const phase of PHASES){
    const pws=workouts.filter(w=>w.date>=phase.start&&w.date<=phase.end&&w.athlete_id==='athlete-gb-001').sort((a,b)=>a.date.localeCompare(b.date))
    if(!pws.length)continue
    const done=pws.filter(w=>w.status==='COMPLETED').length
    const tssTotal=pws.reduce((s,w)=>s+(w.tss_planned||0),0)
    const isActive=t>=phase.start&&t<=phase.end
    const isPast=t>phase.end

    html+=`<div class="phase-block">
      <div class="phase-hd" style="background:${phase.bg};border:1px solid ${phase.color}22">
        <div class="phase-dot" style="background:${phase.color}"></div>
        <div>
          <div class="phase-hd-name" style="color:${phase.color}">${phase.name}</div>
          <div class="phase-hd-dates">${fmt(phase.start)} → ${fmt(phase.end)}</div>
        </div>
        <div class="phase-stats">
          <div class="phase-count" style="color:${phase.color}">${done}/${pws.length} sesiones</div>
          <div class="phase-tss-total">TSS ${tssTotal}</div>
        </div>
        ${isActive?`<div class="now-badge" style="background:${phase.color}">AHORA</div>`:''}
        ${isPast?`<div style="font-size:9px;font-weight:800;color:var(--green);margin-left:6px">✓ Completada</div>`:''}
      </div>`

    for(const w of pws){
      const isT=w.date===t
      const wd=new Date(w.date+'T12:00:00')
      const isFuture=w.date>t
      html+=`<div class="wo-row${isT?' is-today':''}" ${isT?`style="border-color:${phase.color}55"`:''}${isFuture?` style="opacity:.7"`:''}>
        <div class="wo-date">
          <div class="wo-date-dn">${DAYS[wd.getDay()]}</div>
          <div class="wo-date-d" ${isT?`style="color:${phase.color}"`:''}>${wd.getDate()}</div>
          <div class="wo-date-m">${MONTHS[wd.getMonth()]}</div>
        </div>
        <div class="wo-ico">${icon(w.type)}</div>
        <div class="wo-info">
          <div class="wo-name">${w.name}</div>
          <div class="wo-meta">
            <span class="wo-time">⏱ ${w.duration_min}min</span>
            ${tssChip(w.tss_planned)}
            ${w.status==='COMPLETED'?doneChip():''}
          </div>
          ${w.coach_note?`<div class="wo-note">${w.coach_note.length>120?w.coach_note.slice(0,120)+'…':w.coach_note}</div>`:''}
        </div>
      </div>`
    }
    html+='</div>'
  }

  document.getElementById('plan-body').innerHTML=html
}

async function init(){
  try{
    renderCountdown()
    renderPhases()
    const res=await fetch('./data/tucoach.seed.json')
    if(!res.ok)throw new Error('No se pudo cargar el plan')
    const db=await res.json()
    const workouts=(db.workouts||[]).filter(w=>w.athlete_id==='athlete-gb-001')
    const t=todayStr()
    renderStats(workouts,t)
    renderToday(workouts)
    renderWeek(workouts)
    renderPlan(workouts)
    const lastUpdated=workouts.reduce((m,w)=>w.updated_at>m?w.updated_at:m,'')
    if(lastUpdated){
      const d=new Date(lastUpdated)
      document.getElementById('last-update').textContent=`${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`
    }
  }catch(e){
    document.getElementById('today-wrap').innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3)">No se pudo cargar el plan.<br><small style="color:var(--text3)">${e.message}</small></div>`
    document.getElementById('plan-body').innerHTML=''
  }
}

init()
</script>
</body>
</html>
